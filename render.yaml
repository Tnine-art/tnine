services:
  - type: web
    name: tnine-paypoint-demo
    runtime: node
    plan: free
    region: frankfurt
    branch: main
    autoDeployTrigger: commit
    buildCommand: npm ci && npm run db:generate
    startCommand: npm run db:deploy && npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DEPLOYMENT_STAGE
        value: sandbox
      - key: LIVE_MODE
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: tnine-paypoint-demo-db
          property: connectionString
      - key: SESSION_COOKIE_NAME
        value: paypoint_session
      - key: SESSION_TTL_DAYS
        value: "7"
      - key: PAYMENT_PROVIDER
        value: mock
      - key: VTU_PROVIDER
        value: mock
      - key: EMAIL_PROVIDER
        value: console
      - key: PASSWORD_RESET_TTL_MINUTES
        value: "30"

databases:
  - name: tnine-paypoint-demo-db
    plan: free
    region: frankfurt
    postgresMajorVersion: "17"
    databaseName: paypoint_demo
    user: paypoint_demo
    ipAllowList: []
