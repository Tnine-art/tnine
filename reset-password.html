<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#0757e6"><meta name="robots" content="noindex,nofollow"><title>Reset password — PayPoint</title><link rel="stylesheet" href="style.css"></head>
<body class="auth-page" id="resetPasswordPage">
  <main class="auth-shell"><a class="brand" href="index.html"><span class="brand-mark">P</span><span>Pay<span>Point</span></span></a><section class="auth-card"><div class="modal-logo">P</div><h1>Create a new password</h1><p>Use at least 12 characters. A mix of words, numbers, and symbols is recommended.</p>
    <form id="resetPasswordForm">
      <label>New password<input name="password" type="password" autocomplete="new-password" minlength="12" maxlength="128" required placeholder="At least 12 characters"></label>
      <label>Confirm new password<input name="confirmPassword" type="password" autocomplete="new-password" minlength="12" maxlength="128" required placeholder="Repeat your password"></label>
      <div class="password-guidance">Your password must contain at least 12 characters.</div>
      <button class="btn btn-primary btn-block" type="submit">Reset password →</button>
    </form>
    <div class="reset-success" id="resetSuccess" hidden><span>✓</span><h2>Password updated</h2><p>Your other PayPoint sessions have been signed out.</p><a class="btn btn-primary" href="index.html">Return to login</a></div>
    <a class="auth-help-link" href="index.html">← Back to PayPoint</a>
  </section></main><div class="toast" id="toast" role="status" aria-live="polite"></div><script src="scripts.js"></script>
</body></html>
