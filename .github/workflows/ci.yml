name: PayPoint checks

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: paypoint
          POSTGRES_USER: paypoint
          POSTGRES_PASSWORD: paypoint
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U paypoint -d paypoint"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://paypoint:paypoint@localhost:5432/paypoint?schema=public
      INTEGRATION_DATABASE: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run db:generate
      - run: npx prisma validate
      - run: npm run db:deploy
      - run: npm test
      - run: node --check scripts.js
      - run: node --check admin.js
